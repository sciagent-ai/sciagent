<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Diwali! 🪔</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="fireworks" id="fireworks"></div>
        
        <header>
            <h1 class="glow">✨ Happy Diwali ✨</h1>
            <p class="subtitle">Festival of Lights</p>
        </header>

        <div class="diya-container">
            <div class="diya">
                <div class="flame"></div>
                <div class="lamp"></div>
            </div>
            <div class="diya">
                <div class="flame"></div>
                <div class="lamp"></div>
            </div>
            <div class="diya">
                <div class="flame"></div>
                <div class="lamp"></div>
            </div>
        </div>

        <div class="message-box">
            <p class="message">
                May the divine light of Diwali spread into your life<br>
                peace, prosperity, happiness, and good health! 🪔
            </p>
        </div>

        <div class="rangoli">
            <div class="rangoli-pattern"></div>
        </div>

        <button class="celebrate-btn" onclick="celebrate()">
            🎆 Celebrate! 🎆
        </button>

        <footer>
            <p>Wishing you and your family a joyous Diwali! 🎉</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
