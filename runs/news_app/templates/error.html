<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - News App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: #d9534f;
        }
        .error-container {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .back-button {
            display: inline-block;
            background-color: #6c757d;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
        }
        .back-button:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <h1>Error Occurred</h1>
    
    <div class="error-container">
        <p>Sorry, something went wrong while fetching the news:</p>
        <p><strong>{{ error }}</strong></p>
    </div>
    
    <p>This could be due to:</p>
    <ul style="text-align: left; display: inline-block;">
        <li>Missing or invalid API key</li>
        <li>Network connectivity issues</li>
        <li>The News API service being temporarily unavailable</li>
    </ul>
    
    <a href="/" class="back-button">Back to Home</a>
</body>
</html>
